<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WA-Mitra API Tester</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111827;
            color: white;
            padding: 30px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: #1f2937;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        .section {
            margin-bottom: 25px;
            padding: 20px;
            background: #111827;
            border-radius: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            margin-top: 15px;
            font-size: 14px;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #374151;
            color: white;
            font-size: 14px;
        }

        textarea {
            resize: none;
            height: 120px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: #10b981;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #059669;
        }

        .qr-box {
            text-align: center;
            margin-top: 20px;
        }

        .qr-box img {
            width: 300px;
            height: 300px;
            object-fit: contain;
            background: white;
            padding: 10px;
            border-radius: 15px;
        }

        .success {
            color: #10b981;
            margin-top: 15px;
        }

        .error {
            color: #ef4444;
            margin-top: 15px;
        }

        .instance {
            margin-top: 15px;
            word-break: break-all;
            background: #374151;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🚀 WA-Mitra API Tester</h1>

        <!-- CONNECT -->
        <div class="section">

            <h2>Connect WhatsApp</h2>

            <label>Bearer Token</label>
            <input type="text" id="token" placeholder="mitra_xxxxxxxxx">

            <button onclick="connectWhatsapp()" id="connectBtn">
                Generate QR Code
            </button>

            <div id="timerBox"
                style="display:none; margin-top: 15px; color: #fbbf24; font-weight: bold; text-align: center;">
                QR expires in: <span id="countdown">40</span>s
            </div>

            <div class="instance" id="instanceKeyBox" style="display:none;"></div>

            <div class="qr-box">
                <img id="qrImage" style="display:none;">
            </div>

            <div id="connectStatus"></div>

        </div>

        <!-- SEND MESSAGE -->
        <div class="section">

            <h2>Send Message</h2>

            <label>Phone Number</label>
            <input type="text" id="number" placeholder="919876543210">

            <label>Message</label>
            <textarea id="message" placeholder="Type your message"></textarea>

            <label>Attach File (Optional)</label>
            <input type="file" id="file">

            <button onclick="sendMessage()">
                Send Message
            </button>

            <div id="messageStatus"></div>

        </div>

    </div>

    <script>

        // =========================
        // API BASE URL
        // =========================
        // const BASE_URL = "https://silverapi.allysoftsolutions.com/wa-mitra";

        const BASE_URL = "http://localhost:3005/wa-mitra";

        let instanceKey = localStorage.getItem("lastInstanceKey") || "";
        let timerInterval = null;

        // Initialize UI with stored key if exists
        window.onload = () => {
            if (instanceKey) {
                const instanceBox = document.getElementById("instanceKeyBox");
                instanceBox.style.display = "block";
                instanceBox.innerHTML = `<b>Instance Key:</b><br>${instanceKey} <button onclick="clearSession()" style="width: auto; padding: 4px 8px; margin: 0; font-size: 10px; background: #ef4444; margin-top: 5px;">Clear</button>`;
            }
        };

        function clearSession() {
            localStorage.removeItem("lastInstanceKey");
            instanceKey = "";
            location.reload();
        }

        // =========================
        // CONNECT WHATSAPP
        // =========================
        async function connectWhatsapp() {

            const token = document.getElementById("token").value;

            if (!token) {
                alert("Please enter token");
                return;
            }

            try {
                clearInterval(timerInterval);
                document.getElementById("timerBox").style.display = "none";
                document.getElementById("qrImage").style.display = "none";
                document.getElementById("connectStatus").innerHTML = "Initializing session...";

                const response = await fetch(
                    `${BASE_URL}/api/v1/instance/initiate`,
                    {
                        method: "POST",
                        headers: {
                            "Authorization": `Bearer ${token}`,
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            instanceKey: instanceKey || undefined
                        })
                    }
                );

                const data = await response.json();
                console.log("Initiate Response:", data);

                if (data.success) {
                    instanceKey = data.instanceKey;
                    localStorage.setItem("lastInstanceKey", instanceKey);
                    
                    // Show Instance Key
                    const instanceBox = document.getElementById("instanceKeyBox");
                    instanceBox.style.display = "block";
                    instanceBox.innerHTML = `<b>Instance Key:</b><br>${instanceKey} <button onclick="clearSession()" style="width: auto; padding: 4px 8px; margin: 0; font-size: 10px; background: #ef4444; margin-top: 5px;">Clear</button>`;

                    if (data.status === 'connected') {
                        document.getElementById("connectStatus").innerHTML = `<div class="success">WhatsApp is already connected!</div>`;
                        document.getElementById("qrImage").style.display = "none";
                        document.getElementById("timerBox").style.display = "none";
                    } else if (data.qr) {
                        // SHOW QR
                        const qrImage = document.getElementById("qrImage");
                        qrImage.src = data.qr;
                        qrImage.style.display = "block";

                        document.getElementById("connectStatus").innerHTML = `<div class="success">QR Generated Successfully</div>`;

                        // Start Timer
                        let timeLeft = data.validinsecond || 40;
                        document.getElementById("timerBox").style.display = "block";
                        document.getElementById("countdown").innerText = timeLeft;

                        timerInterval = setInterval(() => {
                            timeLeft--;
                            document.getElementById("countdown").innerText = timeLeft;
                            if (timeLeft <= 0) {
                                clearInterval(timerInterval);
                                document.getElementById("qrImage").style.display = "none";
                                document.getElementById("connectStatus").innerHTML = `<div class="error" style="color: #fbbf24;">QR Expired. Refreshing automatically...</div>`;
                                // Auto refresh after a short delay
                                setTimeout(connectWhatsapp, 1000);
                            }
                        }, 1000);
                    } else {
                        document.getElementById("connectStatus").innerHTML = `<div class="success">Session started, waiting for QR...</div>`;
                    }
                } else {
                    document.getElementById("connectStatus").innerHTML = `<div class="error">${data.message || "Failed to initiate session"}</div>`;
                }

            } catch (err) {
                console.error(err);
                document.getElementById("connectStatus").innerHTML = `<div class="error">${err.message}</div>`;
            }
        }

        // =========================
        // SEND MESSAGE
        // =========================
        async function sendMessage() {

            const token =
                document.getElementById("token").value;

            const number =
                document.getElementById("number").value;

            const message =
                document.getElementById("message").value;

            const fileInput =
                document.getElementById("file");

            if (!instanceKey) {
                alert("Please connect WhatsApp first");
                return;
            }

            if (!number) {
                alert("Please enter number");
                return;
            }

            try {

                document.getElementById("messageStatus").innerHTML =
                    "Sending message...";

                let response;

                // =========================
                // SEND MEDIA
                // =========================
                if (fileInput.files.length > 0) {

                    const formData = new FormData();

                    formData.append("instanceKey", instanceKey);
                    formData.append("number", number);
                    formData.append("message", message);
                    formData.append("file", fileInput.files[0]);

                    response = await fetch(
                        `${BASE_URL}/api/v1/messages/send`,
                        {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${token}`
                            },
                            body: formData
                        }
                    );

                } else {

                    // =========================
                    // SEND TEXT
                    // =========================
                    response = await fetch(
                        `${BASE_URL}/api/v1/messages/send`,
                        {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${token}`,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify({
                                instanceKey,
                                number,
                                message
                            })
                        }
                    );
                }

                const data = await response.json();

                console.log("Message Response:", data);

                if (data.success) {

                    document.getElementById("messageStatus").innerHTML =
                        `<div class="success">
            Message Sent Successfully
          </div>`;

                } else {

                    document.getElementById("messageStatus").innerHTML =
                        `<div class="error">
            ${data.message || "Failed to send message"}
          </div>`;
                }

            } catch (err) {

                console.error(err);

                document.getElementById("messageStatus").innerHTML =
                    `<div class="error">
          ${err.message}
        </div>`;
            }
        }

    </script>

</body>

</html>
